<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Giám Sát Tài Xế</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <div class="video-section">
            <div class="header">
                <h1>HỆ THỐNG GIÁM SÁT TÀI XẾ NGỦ GẬT</h1>
            </div>
            <div class="video-wrapper">
                <img id="video-stream" src="/video_feed" alt="Camera Stream">
            </div>
        </div>

        <div class="sidebar">
            <div id="statusPanel" class="status-card status-normal">
                <h2>TRẠNG THÁI</h2>
                <div id="statusText">BÌNH THƯỜNG</div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <span class="label">MẮT (EAR)</span>
                    <span id="earVal" class="value">0.00</span>
                </div>
                <div class="metric-card">
                    <span class="label">MIỆNG (MAR)</span>
                    <span id="marVal" class="value">0.00</span>
                </div>
                <div class="metric-card">
                    <span class="label">GẬT ĐẦU</span>
                    <span id="pitchVal" class="value">0°</span>
                </div>
                <div class="metric-card">
                    <span class="label">NGOÁI ĐẦU</span>
                    <span id="yawVal" class="value">0°</span>
                </div>
            </div>

            <div class="controls-card">
                <h3>BẢNG ĐIỀU KHIỂN</h3>
                <div class="button-group">
                    <button id="testAlarmBtn" class="btn btn-secondary">Test Âm Báo Động</button>
                    <button id="muteBtn" class="btn btn-danger">Tắt Âm</button>
                </div>
                <p class="hint">* Click bất kỳ đâu để kích hoạt âm thanh</p>
            </div>
        </div>
    </div>

    <audio id="alarmSound" src="/static/alarm_sound_effect.wav" preload="auto" loop></audio>
    <script src="/static/script.js"></script>
</body>
</html>
